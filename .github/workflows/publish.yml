name: Publish Suite to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest version for OIDC support
        run: npm install -g npm@latest

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Packages (Optional)
        run: npm run build --workspaces --if-present

      - name: Publish Changed Packages Only
        run: |
          # Loop through each package directory inside workspaces
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              # Get package name and version from package.json
              NAME=$(node -p "require('./$dir/package.json').name")
              VERSION=$(node -p "require('./$dir/package.json').version")
              
              echo "Checking $NAME@$VERSION..."
              
              # Check if this exact version is already live on npm
              if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
                echo "--> $NAME@$VERSION is already published. Skipping."
              else
                echo "--> New version detected! Publishing $NAME@$VERSION..."
                npm publish "./$dir" --provenance
              fi
            fi
          done
