name = "__STORE_SLUG__-worker"
main = "worker.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

node_compat = true

[[d1_databases]]
binding = "DB"
database_name = "__STORE_SLUG__-db"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

[vars]
ALLOWED_ORIGIN = "https://__STORE_SLUG__.pages.dev"

# ─── Secrets (set via: npx wrangler secret put SECRET_NAME) ─────────────────
# TURNSTILE_SECRET_KEY
# TELEGRAM_TOKEN
# TELEGRAM_CHAT_ID
# BREVO_API_KEY
# BREVO_SENDER_EMAIL
# BREVO_SENDER_NAME
